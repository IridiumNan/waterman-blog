baseURL: /
languageCode: zh-cn
title: water-man-site
theme: hugo-theme-stack

pagination:
  pagerSize: 5

enableInlineShortcodes: true
enableRobotsTXT: true

markup:
  goldmark:
    renderer:
      unsafe: true

outputs:
  home:
    - HTML
    - JSON

params:
  author: cai-zixiang
  description: 记录大学成长、项目实战、学习笔记
  defaultTheme: auto
  displayCategories: true
  displayTags: true
  showHomeContent: true  # 👈 加这一行
  search:
    enable: true

menu:
  main:
    - identifier: home
      name: 首页
      url: /
      weight: 1
    - identifier: posts
      name: 文章
      url: /posts
      weight: 2
    - identifier: philosophy
      name: 哲思
      url: /philosophy
      weight: 3
    - identifier: projects
      name: 项目
      url: /projects
      weight: 4
    - identifier: friends
      name: 同途
      url: /friends
      weight: 5
    - identifier: about
      name: 关于我
      url: /about
      weight: 6
